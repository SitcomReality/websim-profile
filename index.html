<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SitcomReality's Profile</title> 
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
        }
      }
      </script>
</head>
<body>
    <div id="profile-container">
        <header id="profile-header">
            <div id="avatar-container">
                <img id="avatar" src="/SITCOMREALITYLOGO.jpg" alt="SitcomReality's Profile Avatar" loading="lazy">
            </div>
            <div id="user-info">
                <h1 id="username">Loading...</h1> 
                <p id="description"></p>
                <div id="stats">
                    <span ><span id="followers-count">--</span> followers</span>
                    <span ><span id="following-count">--</span> following</span>
                    <span ><span id="likes-count">--</span> likes</span>
                    <span ><span id="views-count">--</span> views</span>
                </div>
            </div>
            <!-- New AI Text Container -->
            <div id="ai-text-container">
                <p id="ai-prompt">Generating prompt...</p>
                <p id="ai-response">Thinking...</p>
            </div>
        </header>

        <main id="projects-section">
            <h2>Need a distraction from the apocalypse?</h2>
            <div id="projects-grid">
                <p>Loading projects...</p> 
            </div>
        </main>
    </div>

    <div id="background-canvas"></div>

    <script type="module" src="script.js"></script>
    <script type="module">
        import { initProfile } from './api.js';
        document.addEventListener('DOMContentLoaded', function() { initProfile().catch(console.error); });
    </script>

</body>
</html>
