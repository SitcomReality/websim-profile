<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SitcomReality's Profile</title>
    <!-- Main CSS file that imports others -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="profile-container">
        <header id="profile-header">
            <div id="avatar-container">
                <img id="avatar" src="/SITCOMREALITYLOGO.jpg" alt="SitcomReality's Profile Avatar" loading="lazy">
            </div>
            <div id="user-info">
                <h1 id="username">Loading...</h1>
                <p id="description"></p>
                <div id="stats">
                    <span title="Followers"><span id="followers-count">--</span> followers</span>
                    <span title="Following"><span id="following-count">--</span> following</span>
                    <span title="Likes Received"><span id="likes-count">--</span> likes</span>
                    <span title="Total Views"><span id="views-count">--</span> views</span>
                </div>
            </div>
            <!-- New AI Text Container -->
            <div id="ai-text-container">
                <button id="refresh-ai-button" aria-label="Generate new AI text">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                </button>
                <p id="ai-prompt">Generating prompt...</p>
                <p id="ai-response">Thinking...</p>
            </div>
        </header>

        <main id="board-section">
            <h2>Roll the Dice, Face the Farce</h2>
            <div id="city-container">
                <div id="city-scape">
                    <p>Loading board...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Game HUD -->
    <footer id="game-hud">
        <div id="player-stats-container">
            <span id="stat-score" title="Score"><span class="icon"></span><span class="value">0</span></span>
            <span id="stat-hp" title="Health Points"><span class="icon"></span><span class="value">100</span></span>
            <span id="stat-coins" title="Coins"><span class="icon"></span><span class="value">0</span></span>
            <span id="stat-gems" title="Gems"><span class="icon"></span><span class="value">0</span></span>
            <span id="stat-grenades" title="Grenades"><span class="icon"></span><span class="value">3</span></span>
            <span id="stat-paint" title="Paint (mL)"><span class="icon"></span><span class="value">1000</span></span>
            <span id="stat-limbs" title="Number of Limbs"><span class="icon"></span><span class="value">4</span></span>
            <span id="stat-inertia" title="Existential Inertia"><span class="icon"></span><span class="value">50</span></span>
        </div>
        <!-- Other HUD sections can go here later -->
    </footer>

    <!-- Initialize Profile and Game -->
    <script type="module">
        import { initProfile } from './api.js';
        import { initGame } from './game-systems/gameManager.js';

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                await initProfile(); // Initialize profile (fetches projects, displays board)
                initGame();         // Then initialize game systems (sets up HUD)
            } catch (error) {
                console.error("Initialization failed:", error);
                // Handle potential init failures (e.g., display error messages)
                // Basic error message for user if profile fails badly
                const userEl = document.getElementById('username');
                if (userEl && userEl.textContent === 'Loading...') {
                    userEl.textContent = 'Error';
                    document.getElementById('description').textContent = 'Could not load profile or game board.';
                }
            }
        });
    </script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
